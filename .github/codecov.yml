# The authoritative coverage gate is pytest's `fail_under = 100` (pyproject.toml) — anything below
# 100% already fails the "coverage (100% gate)" CI job. Codecov here is only for the dashboard, the
# trend graph, and the README badge, so its own status checks are informational: they annotate PRs
# but never add a second, redundant merge blocker (and a Codecov outage can't gate a merge).
coverage:
  status:
    project:
      default:
        target: 100%
        informational: true
    patch:
      default:
        informational: true
