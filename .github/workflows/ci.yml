name: CI

on:
  push:
    branches: [main]
  pull_request:

# Grant no permissions by default; each job requests the minimum it needs
# (zizmor: excessive-permissions).
permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# skit is a UTF-8 TUI. Force Python UTF-8 mode everywhere so that captured stdout under pytest —
# cp1252 on the Windows runner, which can't encode the box-drawing/arrow frames the run view
# prints — encodes as UTF-8. Harmless on Linux/macOS (already UTF-8); no effect on real consoles.
env:
  PYTHONUTF8: "1"

jobs:
  quality:
    name: lint + type check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --dev
      - name: ruff check
        run: uv run ruff check
      - name: ruff format --check
        run: uv run ruff format --check
      - name: ty check
        run: uv run ty check
      - name: i18n catalogs compiled & in sync
        run: |
          uv run python scripts/i18n.py compile
          git diff --exit-code -- '*.mo' \
            || { echo '::error::.mo out of sync with .po — run: uv run python scripts/i18n.py compile'; exit 1; }
      - name: i18n coverage (fresh .pot · every locale 100% · nothing unwrapped)
        run: uv run python scripts/i18n_coverage.py

  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --dev
      - name: Run tests
        run: uv run pytest -q

  coverage:
    name: coverage (100% gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --dev
      # fail_under = 100 is configured in pyproject; anything below exits non-zero.
      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=term-missing --cov-report=xml
      # Upload to Codecov even when the 100% gate above fails (!cancelled()), so the dashboard/badge
      # still track the trend; the pytest fail_under gate — not Codecov — is what blocks a merge, so
      # a Codecov outage must never fail CI (fail_ci_if_error: false). Needs a CODECOV_TOKEN secret
      # (repo → Settings → Secrets → Actions); a public repo also falls back to tokenless upload.
      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  mutation:
    name: mutation testing (mutmut)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --dev
      # mutmut exits non-zero when mutants survive, so CI fails on any escaped mutation.
      - name: Run mutation tests
        run: uv run mutmut run

  actions-audit:
    name: zizmor (workflow audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --dev
      - name: zizmor
        run: uv run zizmor .github/workflows
