name: mutation (nightly)

# Mutation testing takes ~2h, so it doesn't belong on the PR path. Run it nightly on main
# and on demand. mutmut's own `run` summary reports survivors at the end of the log.
on:
  schedule:
    - cron: "17 4 * * *" # 04:17 UTC nightly (offset from the top of the hour to dodge load)
  workflow_dispatch:

# Grant no permissions by default; the job requests the minimum it needs.
permissions: {}

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUTF8: "1"

jobs:
  mutation:
    name: mutation testing (mutmut)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --dev
      - name: Run mutation tests
        run: uv run mutmut run
      # `mutmut run` records results but exits 0 for unsuccessful mutant states, so on its own it
      # is not a gate. Validate the exported summary: survivors, missing tests, timeouts, crashes,
      # interruptions, suspicious results, and incomplete accounting all fail the job.
      - name: Validate mutation results
        run: |
          uv run mutmut results || true
          uv run mutmut export-cicd-stats
          uv run python scripts/check_mutation_stats.py
