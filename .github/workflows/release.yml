name: Release

# Triggered by pushing a vX.Y.Z tag: build → verify → publish to PyPI via
# Trusted Publisher (OIDC). No PyPI token needed; the trust relationship is bound
# in the PyPI project settings as "repo + workflow + environment".
on:
  push:
    tags:
      - "v*.*.*"

# Zero permissions by default; each job requests the minimum it needs.
permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"
          # No cache for release-artifact jobs: avoids cache poisoning of what ships to PyPI.
          enable-cache: false

      # Final gate before publishing: the tag version must exactly match the version in
      # pyproject, otherwise the wrong version number gets pinned on PyPI forever
      # (releases cannot be overwritten).
      - name: Verify tag matches project version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          proj="$(uv version --short)"
          echo "tag=$tag project=$proj"
          if [ "$tag" != "$proj" ]; then
            echo "::error::Tag v$tag does not match pyproject version $proj"
            exit 1
          fi

      - name: Run test suite
        run: uv sync --dev && uv run pytest -q

      - name: Build sdist + wheel
        run: uv build

      - name: Check metadata with twine
        run: uvx twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Bound to a protected environment; add required reviewers there for a manual release gate.
    environment:
      name: pypi
      url: https://pypi.org/p/skit
    permissions:
      # Required for the OIDC token exchange; Trusted Publishing uses no long-lived tokens.
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@106e0b0b7c337fa67ed433972f777c6357f78598 # v1.13.0
